<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maturitní četba – Procvičování</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  h1 {
    text-align: center;
    font-size: 1.1rem;
    color: #58a6ff;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0.7;
  }

  /* Book header */
  #book-header {
    text-align: center;
    margin-bottom: 28px;
  }
  #book-title {
    font-size: 2rem;
    font-weight: 700;
    color: #e6edf3;
    line-height: 1.2;
  }
  #book-author {
    font-size: 1.1rem;
    color: #58a6ff;
    margin-top: 6px;
  }

  /* Controls */
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  button {
    background: #161b22;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: #1f2730; border-color: #58a6ff; color: #58a6ff; }
  button:active { background: #1f6feb22; }

  #progress {
    font-size: 0.9rem;
    color: #8b949e;
    min-width: 60px;
    text-align: center;
  }

  /* Column selectors */
  #selectors {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .sel-label {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 20px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #8b949e;
    transition: border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .sel-label:hover { border-color: #58a6ff; color: #c9d1d9; }
  .sel-label input { accent-color: #58a6ff; }
  .sel-label.active { border-color: #1f6feb; color: #58a6ff; background: #1f6feb18; }

  /* Keyboard hint */
  #kb-hint {
    text-align: center;
    font-size: 0.75rem;
    color: #484f58;
    margin-bottom: 24px;
    letter-spacing: 0.03em;
  }
  #kb-hint kbd {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.7rem;
    color: #8b949e;
  }

  /* Cards grid */
  #cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Flashcard */
  .card-wrap {
    perspective: 800px;
    height: 180px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
  }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }

  .card-front {
    background: #161b22;
    border: 1px solid #30363d;
  }
  .card-front:hover { border-color: #1f6feb; }
  .card-num {
    font-size: 0.7rem;
    color: #484f58;
    margin-bottom: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .card-field-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: #58a6ff;
  }
  .card-hint {
    font-size: 0.72rem;
    color: #484f58;
    margin-top: 10px;
  }

  .card-back {
    background: #0f1923;
    border: 1px solid #1f6feb;
    transform: rotateY(180deg);
  }
  .card-back-content {
    font-size: 0.92rem;
    color: #e6edf3;
    line-height: 1.5;
  }

  /* Author card – full width, taller */
  #author-section {
    max-width: 1100px;
    margin: 16px auto 0;
  }
  .author-card-wrap {
    perspective: 1200px;
    height: auto;
    min-height: 200px;
    cursor: pointer;
  }
  .author-card-inner {
    position: relative;
    width: 100%;
    min-height: 200px;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
  }
  .author-card-wrap.flipped .author-card-inner { transform: rotateY(180deg); }

  .author-face {
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    padding: 28px 32px;
  }
  .author-front {
    background: #161b22;
    border: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 200px;
  }
  .author-front:hover { border-color: #1f6feb; }
  .author-back {
    background: #0f1923;
    border: 1px solid #1f6feb;
    transform: rotateY(180deg);
  }
  .author-back-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .author-back-item strong {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #58a6ff;
    margin-bottom: 4px;
  }
  .author-back-item span {
    font-size: 0.9rem;
    color: #e6edf3;
    line-height: 1.5;
  }
  #author-label {
    margin-bottom: 12px;
    display: flex;
    justify-content: center;
  }
  #author-divider {
    border: none;
    border-top: 1px solid #21262d;
    margin: 24px auto 16px;
    max-width: 1100px;
  }
</style>
</head>

<div id="selectors"></div>

const FIELDS = [
  { key: 'druzFormaZanr', label: 'Druh / Forma / Žánr', keys: ['druh','forma','zanr'], defaultOn: true },
  { key: 'tema',          label: 'Téma + Motiv',         keys: ['tema'],              defaultOn: false },
  { key: 'casoprostor',   label: 'Časoprostor',           keys: ['casoprostor'],       defaultOn: false },
  { key: 'kompozice',     label: 'Kompoziční výstavba',   keys: ['kompozice'],         defaultOn: false },
  { key: 'promluvy',      label: 'Vypravěčské způsoby',   keys: ['promluvy'],          defaultOn: false },
];

// State
let order = [...Array(BOOKS.length).keys()];
let currentIdx = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function activeFields() {
  return FIELDS.filter(f => {
    const cb = document.getElementById('cb-' + f.key);
    return cb && cb.checked;
  });
}

function renderBook() {
  const book = BOOKS[order[currentIdx]];
  document.getElementById('book-title').textContent = book.title;
  document.getElementById('book-author').textContent = book.author;
  document.getElementById('progress').textContent = `${currentIdx + 1} / ${BOOKS.length}`;
  renderCards();
  renderAuthorCard();
}

function renderAuthorCard() {
  const section = document.getElementById('author-section');
  const cb = document.getElementById('cb-autor');
  const divider = document.getElementById('author-divider');
  const labelEl = document.getElementById('author-label');

  if (!cb.checked) {
    section.innerHTML = '';
    divider.style.display = 'none';
    labelEl.style.display = 'none';
    return;
  }
  divider.style.display = '';
  labelEl.style.display = '';

  const book = BOOKS[order[currentIdx]];
  const info = AUTHORS[book.author];

  if (!info) {
    section.innerHTML = '';
    return;
  }

  const fields = [
    { label: 'Život / Roky',      val: info.zivot },
    { label: 'Národnost',         val: info.narodnost },
    { label: 'Literární směr',    val: info.smer },
    { label: 'Období',            val: info.obdobi },
    { label: 'Další díla',        val: info.dalsiDila },
    { label: 'Kontext',           val: info.kontext },
  ];

  const itemsHtml = fields.map(f => `
    <div class="author-back-item">
      <strong>${f.label}</strong>
      <span>${f.val}</span>
    </div>`).join('');

  section.innerHTML = `
    <div class="author-card-wrap" id="author-card">
      <div class="author-card-inner">
        <div class="author-face author-front">
          <div class="card-num">O autorovi</div>
          <div class="card-field-name">${book.author}</div>
          <div class="card-hint">klikni pro otočení</div>
        </div>
        <div class="author-face author-back">
          <div class="author-back-grid">${itemsHtml}</div>
        </div>
      </div>
    </div>`;

  document.getElementById('author-card').addEventListener('click', function() {
    this.classList.toggle('flipped');
  });
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  const fields = activeFields();
  fields.forEach((field, i) => {
    const book = BOOKS[order[currentIdx]];
    const answer = field.keys.map(k => {
      const labels = { druh: 'Druh', forma: 'Forma', zanr: 'Žánr' };
      if (field.keys.length > 1) return `<strong>${labels[k] || k}:</strong> ${book[k]}`;
      return book[k];
    }).join('<br>');

    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.dataset.index = i;
    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-num">${i + 1}</div>
          <div class="card-field-name">${field.label}</div>
          <div class="card-hint">klikni pro otočení</div>
        </div>
        <div class="card-face card-back">
          <div class="card-back-content">${answer}</div>
        </div>
      </div>`;
    wrap.addEventListener('click', () => wrap.classList.toggle('flipped'));
    grid.appendChild(wrap);
  });
}

function buildSelectors() {
  const container = document.getElementById('selectors');
  FIELDS.forEach(f => {
    const label = document.createElement('label');
    label.className = 'sel-label' + (f.defaultOn ? ' active' : '');
    label.innerHTML = `<input type="checkbox" id="cb-${f.key}" ${f.defaultOn ? 'checked' : ''}> ${f.label}`;
    const cb = label.querySelector('input');
    cb.addEventListener('change', () => {
      label.classList.toggle('active', cb.checked);
      renderCards();
    });
    container.appendChild(label);
  });
}

function flipAll() {
  const cards = [...document.querySelectorAll('.card-wrap, .author-card-wrap')];
  const anyUnflipped = cards.some(c => !c.classList.contains('flipped'));
  cards.forEach(c => c.classList.toggle('flipped', anyUnflipped));
}

function go(delta) {
  currentIdx = (currentIdx + delta + BOOKS.length) % BOOKS.length;
  renderBook();
}

// Init
buildSelectors();
renderBook();

// Author card toggle
const authorCb = document.getElementById('cb-autor');
const authorToggleLabel = document.getElementById('author-toggle-label');
authorToggleLabel.classList.add('active');
authorCb.addEventListener('change', () => {
  authorToggleLabel.classList.toggle('active', authorCb.checked);
  renderAuthorCard();
});

document.getElementById('btn-prev').addEventListener('click', () => go(-1));
document.getElementById('btn-next').addEventListener('click', () => go(1));
document.getElementById('btn-shuffle').addEventListener('click', () => {
  shuffle(order);
  currentIdx = 0;
  renderBook();
});
document.getElementById('btn-flip-all').addEventListener('click', flipAll);

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  else if (e.key === 'ArrowLeft') go(-1);
  else if (e.key === 's' || e.key === 'S') {
    shuffle(order); currentIdx = 0; renderBook();
  }
  else if (e.key === 'a' || e.key === 'A') flipAll();
  else if (e.key >= '1' && e.key <= '5') {
    const idx = parseInt(e.key) - 1;
    const cards = document.querySelectorAll('.card-wrap');
    if (cards[idx]) cards[idx].classList.toggle('flipped');
  }
  else if (e.key === '6') {
    const ac = document.getElementById('author-card');
    if (ac) ac.classList.toggle('flipped');
  }
});
</script>
